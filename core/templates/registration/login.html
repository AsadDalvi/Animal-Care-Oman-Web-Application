{% extends 'ACO.html' %}
{% load static %}

{% block content %}
<div class="login-form">
    <h2>Login</h2>
    <div class="form-wrapper">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Login</button>
        </form>
    </div>
    <p>Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
</div>
{% endblock %}
