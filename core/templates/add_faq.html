<!-- add_faq.html -->
{% extends 'ACO.html' %}
{% load static %}

{% block content %}
<div class="faq-form">
    <h2>Add a New FAQ</h2>
    <div class="form-wrapper">
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Save FAQ</button>
        </form>
    </div>
</div>
{% endblock %}
