<!-- edit_pet_care_tip.html -->
{% extends 'ACO.html' %}
{% load static %}

{% block content %}
<div class="edit-pet-care-tip-container">
    <h2>Edit Pet Care Tip</h2>

    <form method="POST" class="pet-care-tip-form">
        {% csrf_token %}

        <div class="form-group">
            <label for="id_title">Title:</label>
            {{ form.title }}
        </div>

        <div class="form-group">
            <label for="id_content">Content:</label>
            {{ form.content }}
        </div>

        <button type="submit" class="save-btn">Save Changes</button>
    </form>
</div>
{% endblock %}
