{% extends 'ACO.html' %}
{% load static %}

{% block content %}
<div class="register-form">
    <h2>Register</h2>
    <div class="form-wrapper">
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Register</button>
        </form>
    </div>
    <p>Already got an account? <a href="{% url 'login' %}">Login</a></p>
</div>
{% endblock %}
