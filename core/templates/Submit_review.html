{% extends 'ACO.html' %}
{% load static %}

{% block content %}
<div class="submit-review-container">
    <h2>Submit Review for {{ clinic.name }}</h2>
    <form method="POST">
        {% csrf_token %}

        <!-- Comment Section -->
        <div class="form-group">
            <textarea name="comment" placeholder="Your Review" required></textarea>
        </div>

        <!-- Ratings Section -->
        <div class="rating-container">
            <div class="rate-label">Rate Us!</div>

            <div class="rating-wrapper">
                <input type="radio" id="rating1" name="rating" value="1" required>
                <label for="rating1">★<span class="star-number">1</span></label>
            </div>

            <div class="rating-wrapper">
                <input type="radio" id="rating2" name="rating" value="2" required>
                <label for="rating2">★<span class="star-number">2</span></label>
            </div>

            <div class="rating-wrapper">
                <input type="radio" id="rating3" name="rating" value="3" required>
                <label for="rating3">★<span class="star-number">3</span></label>
            </div>

            <div class="rating-wrapper">
                <input type="radio" id="rating4" name="rating" value="4" required>
                <label for="rating4">★<span class="star-number">4</span></label>
            </div>

            <div class="rating-wrapper">
                <input type="radio" id="rating5" name="rating" value="5" required>
                <label for="rating5">★<span class="star-number">5</span></label>
            </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="submit-btn">Submit Review</button>
    </form>
</div>
{% endblock %}
