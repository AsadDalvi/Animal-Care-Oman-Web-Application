<!-- confirm_delete_faq.html -->
{% extends 'ACO.html' %}
{% load static %}

{% block content %}
<div class="confirm-delete-faq-container">
    <h2>Are you sure you want to delete this FAQ?</h2>
    <p><strong>{{ faq.question }}</strong>: {{ faq.answer }}</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="delete-btn">Delete</button>
        <a href="{% url 'Faq' %}" class="cancel-link">Cancel</a>
    </form>
</div>
{% endblock %}
