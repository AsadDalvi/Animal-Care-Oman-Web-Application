<!-- add_pet_care_tip.html -->
{% extends 'ACO.html' %}
{% load static %}

{% block content %}
<div class="pet-care-tip-form">
    <h2>Add New Pet Care Tip</h2>
    <div class="form-wrapper">
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Add Pet Care Tip</button>
        </form>
    </div>
</div>
{% endblock %}
