<!-- confirm_delete_pet_care_tip.html -->
{% extends 'ACO.html' %}
{% load static %}

{% block content %}
<div class="confirm-delete-pet-care-tip-container">
    <h2>Are you sure you want to delete this Pet Care Tip?</h2>

    <p><strong>{{ tip.title }}</strong></p>
    <p>{{ tip.content }}</p>

    <form method="POST">
        {% csrf_token %}
        <div class="button-container">
            <button type="submit" class="delete-btn">Delete</button>
            <a href="{% url 'pet_care_tips' %}" class="cancel-link">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
